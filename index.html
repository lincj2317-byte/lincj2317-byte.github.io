<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L LAB Tracker</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#16a34a">

<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;background:#f3f4f6;padding:16px}
.card{background:#fff;padding:16px;border-radius:18px;margin-bottom:16px;box-shadow:0 8px 20px rgba(0,0,0,0.05)}
h1{margin:0;font-size:22px}
h2{font-size:16px;margin:12px 0 8px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
input,select{width:100%;padding:10px;border-radius:14px;border:1px solid #ddd;margin-top:6px}
button{border:none;border-radius:16px;padding:12px;font-weight:bold}
.primary{background:#111827;color:white;width:100%;margin-top:12px}
.install{background:#16a34a;color:white}
.small{font-size:13px;color:#6b7280}
.hidden{display:none}
</style>
</head>
<body>

<div class="card">
<div style="display:flex;justify-content:space-between;align-items:center">
<div>
<h1>L LAB Tracker</h1>
<div class="small">V10｜Full PWA｜Root Deploy</div>
</div>
<button id="installBtn" class="install hidden">安裝 App</button>
</div>
</div>

<div class="card">
<h2>每日紀錄</h2>
<input id="date" type="date">
<div class="row">
<select id="shift">
<option>早班</option><option>晚班</option>
<option>大夜</option><option>休假</option>
</select>
<select id="workout">
<option>重訓</option><option>Zone2</option>
<option>HYROX</option><option>休息</option>
</select>
</div>

<div class="row">
<input id="water" placeholder="喝水 ml">
<input id="steps" placeholder="步數">
</div>

<h2>三餐</h2>
<div class="row"><input id="p1" placeholder="蛋白 g"><input id="k1" placeholder="熱量 kcal"></div>
<div class="row"><input id="p2" placeholder="蛋白 g"><input id="k2" placeholder="熱量 kcal"></div>
<div class="row"><input id="p3" placeholder="蛋白 g"><input id="k3" placeholder="熱量 kcal"></div>

<button class="primary" onclick="saveDaily()">儲存今日</button>
<div id="dailyMsg" class="small"></div>
</div>

<div class="card">
<h2>週目標（近7天）</h2>
<div class="row3">
<input id="w1" placeholder="重訓 次" value="2">
<input id="w2" placeholder="Zone2 次" value="2">
<input id="w3" placeholder="HYROX 次" value="1">
</div>
<button class="primary" onclick="saveWeekly()">儲存週目標</button>
<div id="weeklyMsg" class="small"></div>
</div>

<script>
if('serviceWorker' in navigator){
navigator.serviceWorker.register('/sw.js');
}

let deferredPrompt;
const installBtn=document.getElementById('installBtn');

window.addEventListener('beforeinstallprompt',(e)=>{
e.preventDefault();
deferredPrompt=e;
installBtn.classList.remove('hidden');
});

installBtn.addEventListener('click',async()=>{
if(deferredPrompt){
deferredPrompt.prompt();
await deferredPrompt.userChoice;
installBtn.classList.add('hidden');
}
});

function saveDaily(){
const data={
date:date.value,
shift:shift.value,
workout:workout.value,
water:water.value,
steps:steps.value,
p1:p1.value,p2:p2.value,p3:p3.value,
k1:k1.value,k2:k2.value,k3:k3.value
};
localStorage.setItem("daily_v10",JSON.stringify(data));
dailyMsg.innerText="已儲存 ✅";
}

function saveWeekly(){
const data={w1:w1.value,w2:w2.value,w3:w3.value};
localStorage.setItem("weekly_v10",JSON.stringify(data));
weeklyMsg.innerText="已儲存 ✅";
}
</script>

</body>
</html>
