
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>L LAB Tracker</title>
<link rel="manifest" href="manifest.json?v=12">
<meta name="theme-color" content="#16a34a">
<style>
body{margin:0;font-family:sans-serif;background:#f6f7fb}
header{background:#16a34a;color:#fff;padding:16px;font-weight:800}
.card{background:#fff;margin:14px;border-radius:16px;padding:14px}
summary{font-weight:800;font-size:18px;cursor:pointer}
input,select{width:100%;padding:10px;margin:6px 0;border-radius:12px;border:1px solid #ddd}
button{width:100%;padding:12px;border:none;border-radius:14px;background:#111827;color:#fff;font-weight:800;margin-top:8px}
</style>
</head>
<body>

<header>L LAB Tracker V12｜一頁摺頁完整版</header>

<div class="card">
<details open>
<summary>目標設定</summary>
<input placeholder="蛋白目標 g">
<input placeholder="喝水目標 ml">
<button>儲存目標</button>
</details>
</div>

<div class="card">
<details open>
<summary>每日紀錄</summary>
<input type="date">
<select><option>早班</option><option>晚班</option><option>大夜</option></select>
<input placeholder="蛋白 g">
<input placeholder="碳水 g">
<input placeholder="熱量 kcal">
<button>儲存今日</button>
</details>
</div>

<div class="card">
<details>
<summary>週目標</summary>
<input placeholder="重訓 次">
<input placeholder="Zone2 次">
<input placeholder="HYROX 次">
<button>儲存週目標</button>
</details>
</div>

<script>
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js?v=12");
}
</script>

</body>
</html>
