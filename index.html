<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L LAB Tracker</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#16a34a">

<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;background:#f3f4f6;padding:16px}
.card{background:#fff;padding:16px;border-radius:16px;margin-bottom:16px;box-shadow:0 6px 18px rgba(0,0,0,0.05)}
h1{margin:0;font-size:20px}
h2{font-size:16px;margin:12px 0 6px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
input{width:100%;padding:10px;border-radius:12px;border:1px solid #ddd;margin-top:6px}
.btn{background:#111827;color:#fff;padding:12px;border:none;border-radius:14px;width:100%;margin-top:12px}
.small{font-size:13px;color:#6b7280}
</style>
</head>
<body>

<div class="card">
<h1>L LAB Tracker</h1>
<div class="small">v9｜Root Deploy｜含週目標</div>
</div>

<div class="card">
<h2>週目標（近7天）</h2>
<div class="row3">
<div>重訓 次<input id="strength" value="2"></div>
<div>Zone2 次<input id="zone2" value="2"></div>
<div>HYROX 次<input id="hyrox" value="1"></div>
</div>
<button class="btn" onclick="save()">儲存週目標</button>
<div id="msg" class="small"></div>
</div>

<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js');
}

function save(){
  const data={
    strength:strength.value,
    zone2:zone2.value,
    hyrox:hyrox.value
  };
  localStorage.setItem("weekly_goal_v9",JSON.stringify(data));
  msg.innerText="已儲存 ✅";
}

(function load(){
  const d=JSON.parse(localStorage.getItem("weekly_goal_v9"));
  if(d){
    strength.value=d.strength;
    zone2.value=d.zone2;
    hyrox.value=d.hyrox;
  }
})();
</script>

</body>
</html>
